<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1048 408" role="img" aria-label="terminal: cat README.md prints andromaquehere; skills prints languages and AI infrastructure table">
  <style>
    text { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, 'Liberation Mono', monospace; font-size: 14px; fill: #000000; }
    .muted { fill: #848d97; }
    .title { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; fill: #848d97; }
    .cmd1 { clip-path: inset(0 100% 0 0); animation: reveal 1.2s steps(13, end) 0.5s forwards; }
    .caret1 { fill: #000000; animation: slide1 1.2s steps(13, end) 0.5s backwards, off 0.01s linear 2.0s forwards; }
    .artg { clip-path: inset(0 100% 0 0); animation: reveal 1.6s steps(14, end) 2.0s forwards; }
    .p2 { opacity: 0; animation: on 0.01s linear 3.9s forwards; }
    .caret2 { fill: #000000; opacity: 0;
               animation: on 0.01s linear 3.9s forwards,
                          blink 1.1s steps(1, end) 3.9s 2,
                          slide2 0.7s steps(6, end) 6.2s backwards,
                          off 0.01s linear 7.1s forwards; }
    .cmd2 { clip-path: inset(0 100% 0 0); animation: reveal 0.7s steps(6, end) 6.2s forwards; }
    .tblg { clip-path: inset(0 0 100% 0); animation: flush 0.5s steps(13, end) 7.2s forwards; }
    .p3 { opacity: 0; animation: on 0.01s linear 8.0s forwards; }
    .caret3 { fill: #000000; opacity: 0; animation: on 0.01s linear 8.0s forwards, blink 1.1s steps(1, end) 8.0s infinite; }
    @keyframes reveal { to { clip-path: inset(0 0 0 0); } }
    @keyframes flush  { to { clip-path: inset(0 0 0 0); } }
    @keyframes slide1 { from { transform: translateX(0); } to { transform: translateX(109px); } }
    @keyframes slide2 { from { transform: translateX(0); } to { transform: translateX(50px); } }
    @keyframes on     { to { opacity: 1; } }
    @keyframes off    { to { opacity: 0; } }
    @keyframes blink  { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .cmd1, .cmd2, .artg, .tblg { animation: none; clip-path: none; }
      .caret1, .caret2 { animation: none; opacity: 0; }
      .p2, .p3, .caret3 { animation: none; opacity: 1; }
    }
  </style>
